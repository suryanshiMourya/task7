<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Cards</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-100 p-10">

<h1 class="text-3xl font-bold text-center mb-8">
Product Card Grid
</h1>

<div class="grid grid-cols-1 md:grid-cols-2 gap-8">

<div class="bg-white rounded-lg shadow-lg p-5">
<img src="https://via.placeholder.com/250" class="w-full rounded">
<h2 class="text-xl font-bold mt-3">Laptop</h2>
<p class="text-green-600 text-lg font-semibold">₹55,000</p>
<button class="mt-3 bg-blue-500 hover:bg-blue-700 text-white px-4 py-2 rounded">
Buy
</button>
</div>

<div class="bg-white rounded-lg shadow-lg p-5">
<img src="https://via.placeholder.com/250" class="w-full rounded">
<h2 class="text-xl font-bold mt-3">Headphones</h2>
<p class="text-green-600 text-lg font-semibold">₹2,500</p>
<button class="mt-3 bg-blue-500 hover:bg-blue-700 text-white px-4 py-2 rounded">
Buy
</button>
</div>

<div class="bg-white rounded-lg shadow-lg p-5">
<img src="https://via.placeholder.com/250" class="w-full rounded">
<h2 class="text-xl font-bold mt-3">Smart Watch</h2>
<p class="text-green-600 text-lg font-semibold">₹5,000</p>
<button class="mt-3 bg-blue-500 hover:bg-blue-700 text-white px-4 py-2 rounded">
Buy
</button>
</div>

<div class="bg-white rounded-lg shadow-lg p-5">
<img src="https://via.placeholder.com/250" class="w-full rounded">
<h2 class="text-xl font-bold mt-3">Mobile Phone</h2>
<p class="text-green-600 text-lg font-semibold">₹25,000</p>
<button class="mt-3 bg-blue-500 hover:bg-blue-700 text-white px-4 py-2 rounded">
Buy
</button>
</div>

</div>

</body>
</html>
